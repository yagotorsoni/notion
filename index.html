<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startup OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F7F5;--surface:#FFFFFF;--surface2:#F0EFEC;--border:#E5E5E3;
  --text:#1A1A1A;--muted:#787774;--hint:#A8A8A5;
  --blue:#2F6FED;--blue-bg:#EEF3FD;--blue-dark:#1A4FA8;
  --green:#0F9B72;--green-bg:#E9F7F2;
  --red:#C0392B;--red-bg:#FDECEA;
  --amber:#B7620A;--amber-bg:#FEF3E2;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* SIDEBAR */
.sidebar{width:230px;flex-shrink:0;background:var(--surface2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.25rem .75rem;gap:2px;min-height:100vh}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px;margin-bottom:1.25rem}
.brand-icon{width:30px;height:30px;background:#1A1A1A;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.brand-name{font-size:14px;font-weight:600;color:var(--text)}
.nav-label{font-size:10px;font-weight:600;color:var(--hint);letter-spacing:.07em;text-transform:uppercase;padding:8px 8px 3px;margin-top:6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:var(--radius);font-size:13px;color:var(--muted);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif;transition:all .12s}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:var(--surface);color:var(--text);font-weight:500}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nav-icon{font-size:14px;width:16px;text-align:center}

/* MAIN */
.main{flex:1;padding:2.5rem 3.5rem;min-height:100vh}
.section-block{display:none}
.section-block.vis{display:block}

/* PAGE HEADER */
.page-top{margin-bottom:2rem}
.page-emoji{font-size:34px;display:block;margin-bottom:8px}
.page-title{font-size:26px;font-weight:600;color:var(--text);margin-bottom:5px}
.page-desc{font-size:13px;color:var(--muted)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:2rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.9rem 1rem}
.stat-label{font-size:11px;color:var(--hint);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.stat-val{font-size:22px;font-weight:600;color:var(--text)}
.stat-sub{font-size:11px;color:var(--hint);margin-top:2px}
.bar-wrap{height:4px;background:var(--border);border-radius:99px;margin-top:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .5s ease}

/* FILTERS */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.fbtn{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s;font-weight:500}
.fbtn:hover{border-color:var(--text);color:var(--text)}
.fbtn.on{background:var(--text);color:#fff;border-color:var(--text)}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.thead{display:grid;grid-template-columns:minmax(0,2.2fr) minmax(0,.75fr) minmax(0,1fr) 32px;padding:9px 16px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;gap:10px}
.trow{display:grid;grid-template-columns:minmax(0,2.2fr) minmax(0,.75fr) minmax(0,1fr) 32px;padding:11px 16px;border-bottom:1px solid var(--border);align-items:center;gap:10px;transition:background .1s}
.trow:last-child{border-bottom:none}
.trow:hover{background:#FAFAF9}
.trow.done-row{opacity:.42}
.cell-task{display:flex;align-items:center;gap:10px;min-width:0}

/* CHECKBOX */
.chk{width:17px;height:17px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:#fff}
.chk:hover{border-color:var(--hint)}
.chk.chk-admin{background:var(--blue);border-color:var(--blue)}
.chk.chk-op{background:var(--green);border-color:var(--green)}
.chk svg{width:9px;height:9px;stroke:#fff;stroke-width:2.5;fill:none;opacity:0;transition:opacity .1s}
.chk.chk-admin svg,.chk.chk-op svg{opacity:1}

/* TASK INPUT */
.task-input{font-size:13px;color:var(--text);border:none;background:transparent;font-family:'Inter',sans-serif;width:100%;outline:none;padding:2px 4px;border-radius:4px;transition:background .12s;min-width:0}
.task-input:hover{background:#F3F2EF}
.task-input:focus{background:#EEECEA;outline:none}
.done-row .task-input{text-decoration:line-through;color:var(--hint)}

/* PRIORITY BADGE */
.pri-btn{font-size:11px;font-weight:600;padding:3px 10px;border-radius:5px;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .12s;white-space:nowrap}
.pri-btn:hover{filter:brightness(.93)}
.p-alta{background:var(--red-bg);color:var(--red)}
.p-media{background:var(--amber-bg);color:var(--amber)}
.p-baixa{background:var(--blue-bg);color:var(--blue-dark)}

/* STATUS BADGE */
.status-btn{font-size:11px;font-weight:500;padding:3px 9px;border-radius:5px;cursor:pointer;border:none;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:5px;transition:all .12s;white-space:nowrap}
.status-btn:hover{filter:brightness(.93)}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.s-todo{background:#F0EFED;color:#5A5A57}.s-todo .sdot{background:#A8A8A5}
.s-doing{background:var(--amber-bg);color:var(--amber)}.s-doing .sdot{background:var(--amber)}
.s-done{background:var(--green-bg);color:var(--green)}.s-done .sdot{background:var(--green)}
.s-blocked{background:var(--red-bg);color:var(--red)}.s-blocked .sdot{background:var(--red)}

/* DELETE */
.del-btn{width:26px;height:26px;border-radius:5px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s;flex-shrink:0}
.trow:hover .del-btn{opacity:1}
.del-btn:hover{background:var(--red-bg)}
.del-btn svg{width:12px;height:12px;stroke:var(--red);stroke-width:2;fill:none}

/* ADD ROW */
.add-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid var(--border);cursor:pointer;transition:background .12s;user-select:none}
.add-row:hover{background:#FAFAF9}
.add-icon{width:20px;height:20px;border-radius:5px;border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .12s}
.add-row:hover .add-icon{border-color:var(--hint)}
.add-icon svg{width:10px;height:10px;stroke:var(--hint);stroke-width:2;fill:none}
.add-text{font-size:13px;color:var(--hint)}
.add-row:hover .add-text{color:var(--muted)}
</style>
</head>
<body>

<div class="sidebar">
  <div class="brand">
    <div class="brand-icon">🚀</div>
    <span class="brand-name">Minha Startup</span>
  </div>
  <div class="nav-label">Workspace</div>
  <button class="nav-item active" id="nav-admin" onclick="switchSection('admin')">
    <span class="nav-dot" style="background:#2F6FED"></span>Administrativo
  </button>
  <button class="nav-item" id="nav-op" onclick="switchSection('op')">
    <span class="nav-dot" style="background:#0F9B72"></span>Operacional
  </button>
  <div class="nav-label">Páginas</div>
  <button class="nav-item"><span class="nav-icon">📅</span>Reuniões & Atas</button>
  <button class="nav-item"><span class="nav-icon">📊</span>Métricas & KPIs</button>
  <button class="nav-item"><span class="nav-icon">🧲</span>Clientes & CRM</button>
  <button class="nav-item"><span class="nav-icon">💡</span>Produto & Roadmap</button>
  <button class="nav-item"><span class="nav-icon">🗃️</span>Documentos</button>
</div>

<div class="main">

  <!-- ADMIN -->
  <div id="sec-admin" class="section-block vis">
    <div class="page-top">
      <span class="page-emoji">🗂️</span>
      <div class="page-title">Administrativo</div>
      <div class="page-desc">Estrutura legal, financeira e societária da empresa</div>
    </div>
    <div class="stats" id="stats-admin"></div>
    <div class="filters" id="filters-admin">
      <button class="fbtn on" onclick="applyFilter('admin','todos',this)">Todas</button>
      <button class="fbtn" onclick="applyFilter('admin','A fazer',this)">A fazer</button>
      <button class="fbtn" onclick="applyFilter('admin','Em andamento',this)">Em andamento</button>
      <button class="fbtn" onclick="applyFilter('admin','Concluído',this)">Concluídas</button>
      <button class="fbtn" onclick="applyFilter('admin','alta',this)">🔴 Alta prioridade</button>
    </div>
    <div class="table-wrap">
      <div class="thead"><div>Tarefa</div><div>Prioridade</div><div>Status</div><div></div></div>
      <div id="list-admin"></div>
      <div class="add-row" onclick="addTask('admin')">
        <div class="add-icon"><svg viewBox="0 0 10 10"><line x1="5" y1="2" x2="5" y2="8"/><line x1="2" y1="5" x2="8" y2="5"/></svg></div>
        <span class="add-text">Nova tarefa</span>
      </div>
    </div>
  </div>

  <!-- OPERACIONAL -->
  <div id="sec-op" class="section-block">
    <div class="page-top">
      <span class="page-emoji">⚙️</span>
      <div class="page-title">Operacional</div>
      <div class="page-desc">Produto, vendas, clientes e processos do dia a dia</div>
    </div>
    <div class="stats" id="stats-op"></div>
    <div class="filters" id="filters-op">
      <button class="fbtn on" onclick="applyFilter('op','todos',this)">Todas</button>
      <button class="fbtn" onclick="applyFilter('op','A fazer',this)">A fazer</button>
      <button class="fbtn" onclick="applyFilter('op','Em andamento',this)">Em andamento</button>
      <button class="fbtn" onclick="applyFilter('op','Concluído',this)">Concluídas</button>
      <button class="fbtn" onclick="applyFilter('op','alta',this)">🔴 Alta prioridade</button>
    </div>
    <div class="table-wrap">
      <div class="thead"><div>Tarefa</div><div>Prioridade</div><div>Status</div><div></div></div>
      <div id="list-op"></div>
      <div class="add-row" onclick="addTask('op')">
        <div class="add-icon"><svg viewBox="0 0 10 10"><line x1="5" y1="2" x2="5" y2="8"/><line x1="2" y1="5" x2="8" y2="5"/></svg></div>
        <span class="add-text">Nova tarefa</span>
      </div>
    </div>
  </div>

</div>

<script>
const data = {
  admin: [
    {id:1,  name:"Abrir CNPJ",                          pri:"Alta",  status:"A fazer"},
    {id:2,  name:"Definir contrato social entre sócios", pri:"Alta",  status:"A fazer"},
    {id:3,  name:"Abrir conta PJ",                       pri:"Alta",  status:"A fazer"},
    {id:4,  name:"Contratar contador",                   pri:"Alta",  status:"A fazer"},
    {id:5,  name:"Definir regime tributário",             pri:"Alta",  status:"A fazer"},
    {id:6,  name:"Definir pró-labore dos sócios",        pri:"Alta",  status:"A fazer"},
    {id:7,  name:"Assinar NDA entre sócios",             pri:"Alta",  status:"A fazer"},
    {id:8,  name:"Criar e-mail corporativo",             pri:"Alta",  status:"A fazer"},
    {id:9,  name:"Registrar marca no INPI",              pri:"Média", status:"A fazer"},
    {id:10, name:"Criar pasta compartilhada no Drive",   pri:"Baixa", status:"A fazer"},
    {id:11, name:"Abrir conta de investimento PJ",       pri:"Média", status:"A fazer"},
    {id:12, name:"Configurar certificado digital e-CNPJ",pri:"Média", status:"A fazer"},
  ],
  op: [
    {id:101, name:"Definir MVP",                          pri:"Alta",  status:"A fazer"},
    {id:102, name:"Mapear 20 potenciais clientes",        pri:"Alta",  status:"A fazer"},
    {id:103, name:"Criar pitch de apresentação",          pri:"Alta",  status:"A fazer"},
    {id:104, name:"Fazer 10 entrevistas de validação",    pri:"Alta",  status:"A fazer"},
    {id:105, name:"Definir precificação",                 pri:"Alta",  status:"A fazer"},
    {id:106, name:"Criar proposta comercial padrão",      pri:"Alta",  status:"A fazer"},
    {id:107, name:"Montar funil de vendas",               pri:"Alta",  status:"A fazer"},
    {id:108, name:"Criar template de contrato com cliente",pri:"Alta", status:"A fazer"},
    {id:109, name:"Definir OKRs do 1º trimestre",         pri:"Alta",  status:"A fazer"},
    {id:110, name:"Documentar processo de entrega (SOP)", pri:"Média", status:"A fazer"},
    {id:111, name:"Criar perfil LinkedIn da empresa",     pri:"Média", status:"A fazer"},
    {id:112, name:"Montar onboarding de clientes",        pri:"Média", status:"A fazer"},
    {id:113, name:"Mapear concorrentes principais",       pri:"Média", status:"A fazer"},
    {id:114, name:"Criar landing page ou site básico",    pri:"Média", status:"A fazer"},
  ]
};

let filterState = {admin:'todos', op:'todos'};
let nextId = 300;

const priCycle    = ['Alta','Média','Baixa'];
const statusCycle = ['A fazer','Em andamento','Concluído','Bloqueado'];
const priClass    = {Alta:'p-alta', Média:'p-media', Baixa:'p-baixa'};
const statusClass = {'A fazer':'s-todo','Em andamento':'s-doing','Concluído':'s-done','Bloqueado':'s-blocked'};
const accentColor = {admin:'#2F6FED', op:'#0F9B72'};

function getVisible(sec) {
  const f = filterState[sec];
  if (f === 'todos') return data[sec];
  if (f === 'alta')  return data[sec].filter(t => t.pri === 'Alta' && t.status !== 'Concluído');
  return data[sec].filter(t => t.status === f);
}

function renderStats(sec) {
  const tasks = data[sec];
  const total = tasks.length;
  const done  = tasks.filter(t => t.status === 'Concluído').length;
  const doing = tasks.filter(t => t.status === 'Em andamento').length;
  const alta  = tasks.filter(t => t.pri === 'Alta' && t.status !== 'Concluído').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  const color = accentColor[sec];
  document.getElementById('stats-' + sec).innerHTML =
    '<div class="stat"><div class="stat-label">Total</div><div class="stat-val">' + total + '</div><div class="stat-sub">tarefas</div></div>' +
    '<div class="stat"><div class="stat-label">Concluídas</div><div class="stat-val" style="color:' + color + '">' + done + '</div><div class="bar-wrap"><div class="bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div></div>' +
    '<div class="stat"><div class="stat-label">Em andamento</div><div class="stat-val">' + doing + '</div><div class="stat-sub">tarefas</div></div>' +
    '<div class="stat"><div class="stat-label">Alta prioridade</div><div class="stat-val" style="color:#C0392B">' + alta + '</div><div class="stat-sub">requerem atenção</div></div>';
}

function render(sec) {
  renderStats(sec);
  const list    = document.getElementById('list-' + sec);
  const chkCls  = sec === 'admin' ? 'chk-admin' : 'chk-op';
  const visible = getVisible(sec);
  list.innerHTML = '';
  visible.forEach(function(t) {
    const isDone = t.status === 'Concluído';
    const row = document.createElement('div');
    row.className = 'trow' + (isDone ? ' done-row' : '');
    row.innerHTML =
      '<div class="cell-task">' +
        '<div class="chk ' + (isDone ? chkCls : '') + '" onclick="toggleDone(\'' + sec + '\',' + t.id + ')">' +
          '<svg viewBox="0 0 9 7"><polyline points="1,3.5 3.5,6 8,1"/></svg>' +
        '</div>' +
        '<input class="task-input" value="' + escHtml(t.name) + '" ' +
          'onblur="editName(\'' + sec + '\',' + t.id + ',this.value)" ' +
          'onkeydown="if(event.key===\'Enter\')this.blur()" ' +
          'title="Clique para editar o nome">' +
      '</div>' +
      '<div>' +
        '<button class="pri-btn ' + priClass[t.pri] + '" onclick="cyclePri(\'' + sec + '\',' + t.id + ')" title="Clique para mudar a prioridade">' + t.pri + '</button>' +
      '</div>' +
      '<div>' +
        '<button class="status-btn ' + statusClass[t.status] + '" onclick="cycleStatus(\'' + sec + '\',' + t.id + ')" title="Clique para avançar o status">' +
          '<span class="sdot"></span>' + t.status +
        '</button>' +
      '</div>' +
      '<div style="display:flex;justify-content:center">' +
        '<button class="del-btn" onclick="deleteTask(\'' + sec + '\',' + t.id + ')" title="Excluir tarefa">' +
          '<svg viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>' +
        '</button>' +
      '</div>';
    list.appendChild(row);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleDone(sec, id) {
  var t = data[sec].find(function(x){return x.id===id});
  t.status = t.status === 'Concluído' ? 'A fazer' : 'Concluído';
  render(sec);
}

function cyclePri(sec, id) {
  var t = data[sec].find(function(x){return x.id===id});
  t.pri = priCycle[(priCycle.indexOf(t.pri) + 1) % priCycle.length];
  render(sec);
}

function cycleStatus(sec, id) {
  var t = data[sec].find(function(x){return x.id===id});
  t.status = statusCycle[(statusCycle.indexOf(t.status) + 1) % statusCycle.length];
  render(sec);
}

function editName(sec, id, val) {
  var trimmed = val.trim();
  if (!trimmed) return;
  var t = data[sec].find(function(x){return x.id===id});
  t.name = trimmed;
}

function deleteTask(sec, id) {
  if (!confirm('Excluir esta tarefa?')) return;
  data[sec] = data[sec].filter(function(x){return x.id!==id});
  render(sec);
}

function addTask(sec) {
  data[sec].push({id: nextId++, name: 'Nova tarefa', pri: 'Média', status: 'A fazer'});
  filterState[sec] = 'todos';
  document.querySelectorAll('#filters-' + sec + ' .fbtn').forEach(function(b, i){ b.classList.toggle('on', i===0); });
  render(sec);
  var inputs = document.querySelectorAll('#list-' + sec + ' .task-input');
  var last = inputs[inputs.length - 1];
  if (last) { last.focus(); last.select(); }
}

function applyFilter(sec, f, btn) {
  filterState[sec] = f;
  document.querySelectorAll('#filters-' + sec + ' .fbtn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  render(sec);
}

function switchSection(sec) {
  ['admin','op'].forEach(function(s) {
    document.getElementById('sec-'  + s).classList.toggle('vis',    s === sec);
    document.getElementById('nav-'  + s).classList.toggle('active', s === sec);
  });
}

render('admin');
render('op');
</script>
</body>
</html>
